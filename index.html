      { term: 'Context', definition: 'Background information that helps the AI understand your request. Including context like "I\'m writing to a resident who\'s frustrated" helps the AI tailor its response appropriately.' },
      { term: 'Conversation / Thread', definition: 'An ongoing exchange with the AI. The AI remembers what you\'ve discussed within a conversation, so you can refine and build on earlier responses.' },
      { term: 'Follow-up', definition: 'Asking the AI to adjust, expand, or refine its previous response. You can say things like "make it shorter" or "now do the same for the second point".' },

    category: 'Understanding Outputs',
    description: 'What to know about what AI produces',
    terms: [
      { term: 'Hallucination', definition: 'When AI confidently presents false information as fact. It might invent statistics, cite non-existent sources, or describe events that never happened. This is why you must always verify important facts.' },
      { term: 'Confidence', definition: 'AI always sounds certain, even when wrong. Unlike humans, it won\'t say "I\'m not sure about this." This is a feature of how it works, not a sign of accuracy—always verify claims that matter.' },

      { term: 'Context window', definition: 'How much text an AI can "hold in mind" at once, measured in tokens. A larger context window means the AI can work with longer documents without forgetting the beginning.' }

        tone: '', toneCustom: '', audience: '', audienceCustom: '',
        response: '', responseCustom: ''
      };
    } catch {
      return {
        context: '', objective: '', style: '', styleCustom: '',
        tone: '', toneCustom: '', audience: '', audienceCustom: '',
        response: '', responseCustom: ''
      };
    }
  });

  const [showValidation, setShowValidation] = useState(false);

  useEffect(() => {
    const timer = setInterval(() => setTime(new Date()), 60000);
    return () => clearInterval(timer);
  }, []);

  // Persist prompt builder data across reloads
  useEffect(() => {
    try { localStorage.setItem('genai-builder-data', JSON.stringify(builderData)); } catch {}
  }, [builderData]);

  // Simple stemming - removes common suffixes to match related words
  const stem = (word) => {
    return word.toLowerCase()
      .replace(/ing$/, '')
      .replace(/tion$/, '')
      .replace(/ed$/, '')
      .replace(/ly$/, '')
      .replace(/ment$/, '')
      .replace(/ness$/, '')
      .replace(/ies$/, 'y')
      .replace(/es$/, '')
      .replace(/s$/, '');
  };

  // Check if query matches task using fuzzy logic
  const matchesTask = (task, query) => {
    const taskLower = task.toLowerCase();
    const queryLower = query.toLowerCase();
    
    // Direct inclusion match
    if (taskLower.includes(queryLower)) return true;
    
    // Stemmed word matching
    const queryWords = queryLower.split(/\s+/);
    const taskWords = taskLower.split(/\s+/);
    
    return queryWords.every(qWord => {
      const stemmedQuery = stem(qWord);
      return taskWords.some(tWord => {
        const stemmedTask = stem(tWord);
        return stemmedTask.includes(stemmedQuery) || stemmedQuery.includes(stemmedTask);
      });
    });
  };

  useEffect(() => {
    if (searchQuery.length > 1) {
      const filtered = taskData.filter(t => matchesTask(t.task, searchQuery));
      setSearchResults(filtered);
    } else {
      setSearchResults([]);
    }
  }, [searchQuery]);

  const suggestedTasks = [

  ];

    if (answer === 'sensitive-stop') {
      setView('sensitive-stop');
    } else if (typeof answer === 'object' && answer.result) {
      setResult(answer.result);
      setView('result');
    } else if (typeof answer === 'object' && answer.next) {
      setFlowStep(answer.next);
    } else {
      setFlowStep(answer);
    }
  };

    setBuilderStep(0);

      style: '',
      styleCustom: '',
      tone: '',
      toneCustom: '',
      audience: '',
      audienceCustom: '',
      response: '',
      responseCustom: ''
    });
    setGeneratedPrompt('');
    setCopyStatus('idle');
    setShowValidation(false);
  };

  const handleBuilderNext = () => {
    if (canProceedBuilder()) {
      setShowValidation(false);
      setBuilderStep(builderStep + 1);
    } else {
      setShowValidation(true);
    }
  };

  const openBuilder = () => {
    resetBuilder();
    setView('builder');
  };

  const getBuilderValue = (stepId) => {
    const custom = builderData[`${stepId}Custom`];
    const selected = builderData[stepId];
    if (custom && custom.trim()) return custom;
    if (selected) {
      const step = costarSteps.find(s => s.id === stepId);
      const option = step?.options?.find(o => o.value === selected);
      return option ? option.label.toLowerCase() : selected;
    }
    return '';
  };

  const generatePrompt = () => {
    const context = builderData.context.trim();
    const objective = builderData.objective.trim();
    const style = getBuilderValue('style');
    const tone = getBuilderValue('tone');
    const audience = getBuilderValue('audience');
    const response = getBuilderValue('response');

    let prompt = '';
    
    // Start with context as scene-setting
    if (context) {
      prompt += context;
      if (!context.endsWith('.') && !context.endsWith('?') && !context.endsWith('!')) {
        prompt += '.';
      }
      prompt += '\n\n';
    }
    
    // Add objective as the core request
    if (objective) {
      prompt += objective;
      if (!objective.endsWith('.') && !objective.endsWith('?') && !objective.endsWith('!')) {
        prompt += '.';
      }
    }
    
    // Build the style/tone/audience/format line naturally
    const qualifiers = [];
    
    if (style && tone) {
      qualifiers.push(`Use a ${style}, ${tone} tone`);
    } else if (style) {
      qualifiers.push(`Use a ${style} style`);
    } else if (tone) {
      qualifiers.push(`Use a ${tone} tone`);
    }
    
    if (audience) {
      const audienceMap = {
        'resident / ratepayer': 'a resident',
        'councillor / executive': 'councillors/executive leadership',
        'internal staff': 'internal colleagues',
        'local business': 'a local business owner',
        'media / public': 'a general audience',
        'technical specialist': 'technical specialists'
      };
      const audienceText = audienceMap[audience] || audience;
      qualifiers.push(`written for ${audienceText}`);
    }
    
    if (response) {
      const formatMap = {
        'email': 'as a ready-to-send email',
        'report / document': 'as a structured report with clear sections',
        'briefing note': 'as a concise briefing note',
        'dot points': 'as clear dot points',
        'paragraphs': 'as flowing paragraphs',
        'social media post': 'as a short social media post',
        'talking points': 'as talking points for verbal delivery',
        'template / form': 'as a reusable template'
      };
      qualifiers.push(formatMap[response] || `as ${response}`);

      prompt += '\n\n';

      if (qualifiers.length === 1) {

        prompt += first + ', ' + qualifiers[1] + '.';

          font-weight: 600;
          color: #FFA69E;
        }

        .profile-back {
          margin-left: auto;
        }

        .profile-description {
          font-size: 1.1rem;
          line-height: 1.7;
          max-width: 800px;
          margin-bottom: 2rem;
          opacity: 0.85;
        }

        .profile-quick-actions {
          display: flex;
          gap: 1rem;
          margin-bottom: 3rem;
          flex-wrap: wrap;
        }

        .profile-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
          gap: 1.25rem;
          margin-bottom: 3rem;
        }

        .profile-card {
          background: rgba(235,234,229,0.04);
          border: 1px solid rgba(235,234,229,0.08);
          border-radius: 16px;
          padding: 1.5rem;
          transition: all 0.2s ease;
        }

        .profile-card:hover {
          background: rgba(235,234,229,0.06);
          border-color: rgba(235,234,229,0.12);
        }

        .profile-card.highlight {
          background: rgba(154,206,110,0.08);
          border-color: rgba(154,206,110,0.2);
        }

        .profile-card.caution {
          background: rgba(255,166,158,0.06);
          border-color: rgba(255,166,158,0.15);
        }

        .profile-card h3 {
          font-size: 0.75rem;
          text-transform: uppercase;
          letter-spacing: 1.5px;
          opacity: 0.5;
          margin-bottom: 1rem;
        }

        .profile-card ul {
          list-style: none;
        }

        .profile-card li {
          padding: 0.6rem 0;
          border-bottom: 1px solid rgba(235,234,229,0.08);
          font-size: 0.95rem;
          line-height: 1.5;
        }

        .profile-card li:last-child {
          border-bottom: none;
        }

        .model-item {
          display: flex;
          flex-direction: column;
          gap: 0.25rem;
        }

        .model-name {
          font-weight: 600;
        }

        .model-desc {
          font-size: 0.85rem;
          opacity: 0.7;
        }

        /* Profile Tiers Section */
        .section-title {
          font-size: 1.1rem;
          font-weight: 600;
          margin-bottom: 1.25rem;
          color: #EBEAE5;
        }

        .profile-tiers {
          margin-bottom: 2.5rem;
        }

        .tiers-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
          gap: 1rem;
        }

        .tier-card {
          background: rgba(235,234,229,0.04);
          border: 1px solid rgba(235,234,229,0.1);
          border-radius: 14px;
          padding: 1.25rem;
          transition: all 0.2s ease;
        }

        .tier-card:hover {
          background: rgba(235,234,229,0.07);
          border-color: rgba(235,234,229,0.15);
        }

        .tier-card.free {
          border-color: rgba(154,206,110,0.3);
          background: rgba(154,206,110,0.05);
        }

        .tier-header {
          display: flex;
          justify-content: space-between;
          align-items: baseline;
          margin-bottom: 0.75rem;
          gap: 0.5rem;
        }

        .tier-name {
          font-weight: 600;
          font-size: 1rem;
        }

        .tier-price {
          font-size: 0.85rem;
          color: #9ACE6E;
          font-weight: 500;
        }

        .tier-features {
          font-size: 0.85rem;
          line-height: 1.5;
          opacity: 0.7;
        }

        /* Profile Features Section */
        .profile-features {
          margin-bottom: 2.5rem;
        }

        .features-list {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
          gap: 0.75rem 1.5rem;
        }

        .feature-item {
          display: flex;
          align-items: flex-start;
          gap: 0.75rem;
          font-size: 0.95rem;
          line-height: 1.5;
        }

        .feature-check {
          color: #9ACE6E;
          font-weight: 600;
          flex-shrink: 0;
        }

        .profile-tasks {
          margin-bottom: 3rem;
        }

        .profile-tasks h3 {
          font-size: 1.25rem;
          font-weight: 600;
          margin-bottom: 1.25rem;
        }

        .task-chips {
          display: flex;
          flex-wrap: wrap;
          gap: 0.75rem;
        }

        .task-chip {
          padding: 0.6rem 1.25rem;
          border-radius: 30px;
          background: rgba(235,234,229,0.08);
          font-size: 0.9rem;
          border: 1px solid rgba(235,234,229,0.15);
        }

        .protected-badge {
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          background: rgba(255,166,158,0.2);
          color: #FFA69E;
          padding: 0.5rem 1rem;
          border-radius: 30px;
          font-size: 0.85rem;
          font-weight: 600;
          margin-bottom: 1.5rem;
        }

        /* Search overlay */
        .search-view {
          position: fixed;
          inset: 0;
          background: rgba(32,62,60,0.98);
          backdrop-filter: blur(20px);
          z-index: 100;
          display: flex;
          flex-direction: column;
          padding: 2rem 3rem;
          animation: fadeIn 0.2s ease;
        }

        .search-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 2rem;
        }

        .search-back {
          background: transparent;
          border: none;
          color: rgba(235,234,229,0.6);
          font-family: 'Poppins', sans-serif;
          font-size: 0.9rem;
          cursor: pointer;
          padding: 0.5rem 0;
          transition: color 0.2s ease;
        }

        .search-back:hover {
          color: #EBEAE5;
        }

        .search-close {
          width: 40px;
          height: 40px;
          border-radius: 50%;
          border: none;
          background: rgba(235,234,229,0.1);
          color: #EBEAE5;
          font-size: 1.5rem;
          cursor: pointer;
          transition: all 0.2s ease;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .search-close:hover {
          background: rgba(235,234,229,0.2);
        }

        .search-input-wrap {
          max-width: 700px;
          margin: 0 auto;
          width: 100%;
          position: relative;
          display: flex;
          align-items: center;
        }

        .search-icon {
          position: absolute;
          left: 0;
          width: 20px;
          height: 20px;
          border: 2px solid rgba(235,234,229,0.4);
          border-radius: 50%;
        }

        .search-input {
          width: 100%;
          background: transparent;
          border: none;
          border-bottom: 3px solid rgba(235,234,229,0.2);
          padding: 1.5rem 2.5rem 1.5rem 3rem;
          font-family: 'Poppins', sans-serif;
          font-size: 2rem;
          font-weight: 300;
          color: #EBEAE5;
          outline: none;
          transition: border-color 0.3s ease;
        }

        .search-input:focus {
          border-color: #9ACE6E;
        }

        .search-input::placeholder {
          color: rgba(235,234,229,0.3);
        }

        .search-clear {
          position: absolute;
          right: 0;
          width: 32px;
          height: 32px;
          border-radius: 50%;
          border: none;
          background: rgba(235,234,229,0.1);
          color: rgba(235,234,229,0.6);
          font-size: 1.25rem;
          cursor: pointer;
          transition: all 0.2s ease;
        }

        .search-clear:hover {
          background: rgba(235,234,229,0.2);
          color: #EBEAE5;
        }

        .search-results {
          max-width: 700px;
          margin: 2rem auto 0;
          width: 100%;
          flex: 1;
          overflow-y: auto;
        }

        .search-suggestions {
          animation: fadeIn 0.3s ease;
        }

        .suggestions-label, .results-count {
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 1.5px;
          color: rgba(235,234,229,0.4);
          margin-bottom: 1.25rem;
        }

        .suggestions-grid {
          display: flex;
          flex-direction: column;
          gap: 0.5rem;
        }

        .suggestion-chip {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 1rem 1.25rem;
          background: rgba(235,234,229,0.04);
          border: 1px solid rgba(235,234,229,0.08);
          border-radius: 12px;
          color: #EBEAE5;
          font-family: 'Poppins', sans-serif;
          font-size: 1rem;
          text-align: left;
          cursor: pointer;
          transition: all 0.2s ease;
        }

        .suggestion-chip:hover {
          background: rgba(235,234,229,0.08);
          border-color: rgba(235,234,229,0.15);
          transform: translateX(4px);
        }

        .suggestion-task {
          flex: 1;
        }

        .suggestion-tool {
          padding: 0.35rem 0.85rem;
          border-radius: 20px;
          font-size: 0.75rem;
          font-weight: 600;
          flex-shrink: 0;
          margin-left: 1rem;
        }

        .search-results-list {
          animation: fadeIn 0.2s ease;
        }

        .search-result {
          display: flex;
          justify-content: space-between;
          align-items: center;
          width: 100%;
          padding: 1rem 0;
          border: none;
          border-bottom: 1px solid rgba(235,234,229,0.08);
          background: transparent;
          cursor: pointer;
          transition: all 0.2s ease;
          font-family: 'Poppins', sans-serif;
          text-align: left;
        }

        .search-result:hover {
          padding-left: 1rem;
          background: rgba(235,234,229,0.03);
        }

        .search-result-task {
          font-size: 1.05rem;
          color: #EBEAE5;
        }

        .search-result-tool {
          padding: 0.4rem 1rem;
          border-radius: 30px;
          font-size: 0.8rem;
          font-weight: 600;
        }

        .search-empty {
          text-align: center;
          padding: 3rem 1rem;
          animation: fadeIn 0.3s ease;
        }

        .empty-icon {
          font-size: 3rem;
          display: block;
          margin-bottom: 1rem;
        }

        .empty-title {
          font-size: 1.25rem;
          font-weight: 600;
          margin-bottom: 0.5rem;
        }

        .empty-hint {
          color: rgba(235,234,229,0.5);
          margin-bottom: 1.5rem;
        }

        /* Flow view - Redesigned */
        .flow-view {
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 2rem;
          animation: fadeIn 0.3s ease;
        }

        .flow-back-top {
          align-self: flex-start;
          background: transparent;
          border: none;
          color: rgba(235,234,229,0.5);
          font-family: 'Poppins', sans-serif;
          font-size: 0.9rem;
          cursor: pointer;
          padding: 0.5rem 0;
          margin-bottom: 2rem;
          transition: color 0.2s ease;
        }

        .flow-back-top:hover {
          color: #EBEAE5;
        }

        .flow-card {
          background: rgba(235,234,229,0.03);
          border: 1px solid rgba(235,234,229,0.08);
          border-radius: 24px;
          padding: 3rem;
          max-width: 600px;
          width: 100%;
          text-align: center;
        }

        .flow-progress {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 0;
          margin-bottom: 2.5rem;
        }

        .flow-step {
          width: 40px;
          height: 40px;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(235,234,229,0.08);
          border: 2px solid rgba(235,234,229,0.15);
          font-weight: 600;
          font-size: 0.9rem;
          color: rgba(235,234,229,0.4);
          transition: all 0.3s ease;
        }

        .flow-step.active {
          background: #9ACE6E;
          border-color: #9ACE6E;
          color: #203E3C;
          transform: scale(1.1);
        }

        .flow-step.complete {
          background: rgba(154,206,110,0.2);
          border-color: #9ACE6E;
          color: #9ACE6E;
        }

        .flow-connector {
          width: 40px;
          height: 2px;
          background: rgba(235,234,229,0.15);
        }

        .flow-question {
          font-size: clamp(1.5rem, 4vw, 2rem);
          font-weight: 600;
          line-height: 1.4;
          margin-bottom: 2rem;
        }

        .flow-options {
          display: flex;
          flex-direction: column;
          gap: 0.75rem;
          width: 100%;
        }

        .flow-option {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 1.25rem 1.5rem;
          border-radius: 14px;
          border: 2px solid rgba(235,234,229,0.12);
          background: rgba(0,0,0,0.15);
          color: #EBEAE5;
          font-family: 'Poppins', sans-serif;
          font-size: 1rem;
          cursor: pointer;
          transition: all 0.2s ease;
          text-align: left;
        }

        .flow-option:hover {
          border-color: #9ACE6E;
          background: rgba(154,206,110,0.08);
        }

        .flow-option-arrow {
          opacity: 0;
          transform: translateX(-8px);
          transition: all 0.2s ease;
          color: #9ACE6E;
        }

        .flow-option:hover .flow-option-arrow {
          opacity: 1;
          transform: translateX(0);
        }

        .flow-binary {
          flex-direction: row;
          gap: 1rem;
        }

        .flow-binary .flow-option {
          flex: 1;
          flex-direction: column;
          text-align: center;
          padding: 1.5rem;
          gap: 0.5rem;
        }

        .flow-option-icon {
          font-size: 1.25rem;
          opacity: 0.7;
        }

        .flow-binary .flow-option.yes:hover {
          border-color: #FFA69E;
          background: rgba(255,166,158,0.1);
        }

        .flow-binary .flow-option.no:hover {
          border-color: #9ACE6E;
          background: rgba(154,206,110,0.08);
        }

        /* Result view - Redesigned */
        .result-view {
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 2rem;
          animation: fadeIn 0.3s ease;
        }

        .result-card {
          background: rgba(235,234,229,0.03);
          border: 1px solid rgba(235,234,229,0.08);
          border-radius: 24px;
          padding: 2.5rem;
          max-width: 480px;
          width: 100%;
          text-align: center;
          animation: scaleIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes scaleIn {
          from { opacity: 0; transform: scale(0.95); }
          to { opacity: 1; transform: scale(1); }
        }

        .result-badge {
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          padding: 0.5rem 1rem;
          background: rgba(154,206,110,0.15);
          border-radius: 20px;
          font-size: 0.85rem;
          font-weight: 600;
          color: #9ACE6E;
          margin-bottom: 1.5rem;
        }

        .result-badge span {
          font-size: 0.9rem;
        }

        .result-tool {
          display: flex;
          align-items: center;
          gap: 1rem;
          padding: 1.25rem 1.5rem;
          border-radius: 16px;
          cursor: pointer;
          transition: all 0.2s ease;
          margin-bottom: 1.5rem;
        }

        .result-tool:hover {
          transform: scale(1.02);
          box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .result-tool-icon {
          width: 56px;
          height: 56px;
          border-radius: 50%;
          background: rgba(0,0,0,0.2);
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 1.5rem;
          font-weight: 700;
          flex-shrink: 0;
        }

        .result-tool-info {
          text-align: left;
        }

        .result-tool-name {
          display: block;
          font-size: 1.5rem;
          font-weight: 700;
        }

        .result-tool-tagline {
          display: block;
          font-size: 0.9rem;
          opacity: 0.8;
        }

        .result-reason {
          font-size: 0.95rem;
          line-height: 1.6;
          color: rgba(235,234,229,0.8);
          margin-bottom: 2rem;
        }

        .result-actions {
          display: flex;
          gap: 0.75rem;
        }

        .result-actions .btn {
          flex: 1;
        }

        .result-alternatives {
          margin-top: 2rem;
          width: 100%;
          max-width: 480px;
        }

        .alternatives-label {
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 1.5px;
          color: rgba(235,234,229,0.55);
          margin-bottom: 1rem;
          text-align: center;
        }

        .alternatives-grid {
          display: flex;
          justify-content: center;
          gap: 0.75rem;
          flex-wrap: wrap;
        }

        .alternative-chip {
          display: flex;
          align-items: center;
          gap: 0.5rem;
          padding: 0.6rem 1rem;
          background: rgba(235,234,229,0.05);
          border: 1px solid rgba(235,234,229,0.1);
          border-radius: 30px;
          cursor: pointer;
          transition: all 0.2s ease;
          font-family: 'Poppins', sans-serif;
        }

        .alternative-chip:hover {
          background: rgba(235,234,229,0.1);
          border-color: rgba(235,234,229,0.2);
        }

        .alt-icon {
          width: 28px;
          height: 28px;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 0.8rem;
          font-weight: 700;
        }

        .alt-name {
          font-size: 0.85rem;
          color: #EBEAE5;
        }

        /* Legacy flow-back and result styles - keep for backward compatibility */
        .flow-back {
          display: none;
        }

        .result-label, .result-tip, .result-profile-link {
          display: none;
        }

        .result-actions {
          display: flex;
          gap: 1rem;
          justify-content: center;
          flex-wrap: wrap;
        }

        /* Footer */
        .footer {
          background: linear-gradient(to bottom, transparent, rgba(30, 67, 113, 0.3));
          padding: 2rem 3rem;
          margin-top: auto;
        }

        .footer-inner {
          max-width: 1400px;
          margin: 0 auto;
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-wrap: wrap;
          gap: 2rem;
        }

        .footer-reminders {
          display: flex;
          gap: 2.5rem;
          flex-wrap: wrap;
        }

        .reminder-item {
          display: flex;
          align-items: center;
          gap: 0.75rem;
          font-size: 0.85rem;
          opacity: 0.8;
        }

        .reminder-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: #9ACE6E;
          flex-shrink: 0;
        }

        .footer-contact {
          font-size: 0.85rem;
          opacity: 0.6;
        }

        /* Reference view */
        .reference-view {
          padding-top: 2rem;
        }

        .reference-header {
          display: flex;
          justify-content: space-between;
          align-items: flex-end;
          margin-bottom: 3rem;
          flex-wrap: wrap;
          gap: 1rem;
        }

        .reference-header h2 {
          font-size: 2.5rem;
          font-weight: 300;
        }

        .reference-header h2 strong {
          font-weight: 700;
        }

        .reference-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
          gap: 1rem;
        }

        .ref-card {
          background: rgba(235,234,229,0.05);
          border: 1px solid rgba(235,234,229,0.1);
          border-radius: 16px;
          padding: 1.5rem;
          transition: all 0.3s ease;
          cursor: pointer;
        }

        .ref-card:hover {
          background: rgba(235,234,229,0.08);
          border-color: rgba(235,234,229,0.2);
        }

        .ref-card-task {
          font-size: 1rem;
          font-weight: 500;
          margin-bottom: 0.75rem;
        }

        .ref-card-tool {
          display: inline-block;
          padding: 0.35rem 0.75rem;
          border-radius: 20px;
          font-size: 0.8rem;
          font-weight: 600;
        }

        /* Glossary View */
        .glossary-view {
          padding-top: 1rem;
          animation: fadeIn 0.3s ease;
        }

        .glossary-header {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          margin-bottom: 2rem;
          flex-wrap: wrap;
          gap: 1rem;
        }

        .glossary-title-section h2 {
          font-size: 2.5rem;
          font-weight: 300;
          margin-bottom: 0.5rem;
        }

        .glossary-title-section h2 strong {
          font-weight: 700;
        }

        .glossary-subtitle {
          font-size: 1rem;
          opacity: 0.7;
        }

        .glossary-intro {
          max-width: 700px;
          margin-bottom: 2.5rem;
        }

        .glossary-intro p {
          font-size: 1.05rem;
          line-height: 1.7;
          opacity: 0.85;
        }

        .glossary-categories {
          display: flex;
          flex-direction: column;
          gap: 1rem;
          margin-bottom: 3rem;
        }

        .glossary-category {
          background: rgba(235,234,229,0.03);
          border: 1px solid rgba(235,234,229,0.1);
          border-radius: 16px;
          overflow: hidden;
          transition: all 0.3s ease;
        }

        .glossary-category.expanded {
          background: rgba(235,234,229,0.06);
          border-color: rgba(235,234,229,0.2);
        }

        .glossary-category-header {
          width: 100%;
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 1.5rem;
          background: transparent;
          border: none;
          color: #EBEAE5;
          cursor: pointer;
          text-align: left;
          font-family: 'Poppins', sans-serif;
          transition: background 0.2s ease;
        }

        .glossary-category-header:hover {
          background: rgba(235,234,229,0.05);
        }

        .glossary-category-info {
          display: flex;
          align-items: center;
          gap: 1.25rem;
        }

        .glossary-category-number {
          width: 36px;
          height: 36px;
          border-radius: 50%;
          background: rgba(154,206,110,0.2);
          color: #9ACE6E;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: 600;
          font-size: 0.9rem;
          flex-shrink: 0;
        }

        .glossary-category-info h3 {
          font-size: 1.1rem;
          font-weight: 600;
          margin-bottom: 0.25rem;
        }

        .glossary-category-info p {

                    </div>
                    <div className="preview-content">
                      {builderData.context || builderData.objective ? (
                        <>
                          {builderData.context && (
                            <p className="preview-context">{builderData.context}</p>
                          )}
                          {builderData.objective && (
                            <p className="preview-objective">{builderData.objective}</p>
                          )}
                          {(getBuilderValue('style') || getBuilderValue('tone') || getBuilderValue('audience') || getBuilderValue('response')) && (
                            <p className="preview-qualifiers">
                              {[
                                getBuilderValue('style') && getBuilderValue('tone') 
                                  ? `${getBuilderValue('style')}, ${getBuilderValue('tone')} tone`
                                  : getBuilderValue('style') 
                                    ? `${getBuilderValue('style')} style`
                                    : getBuilderValue('tone') 
                                      ? `${getBuilderValue('tone')} tone`
                                      : null,
                                getBuilderValue('audience') && `for ${getBuilderValue('audience')}`,
                                getBuilderValue('response') && `as ${getBuilderValue('response')}`
                              ].filter(Boolean).join(' · ')}
                            </p>
                          )}
                        </>
                      ) : (
                        <p className="preview-empty">Your prompt will appear here as you build it...</p>
                      )}
                    </div>
                  </div>
                </div>
              ) : (
                /* Results view */
                <div className="builder-results">
                  <div className="results-success">
                    <span className="success-icon">✓</span>
                    <h2>Prompt ready</h2>
                  </div>

                  <div className="builder-prompt-card">
                    <pre className="builder-prompt-text">{generatedPrompt}</pre>
                    <button 
                      className={`builder-copy-btn ${copyStatus}`}
                      onClick={copyPrompt}
                      disabled={copyStatus === 'copying'}
                      aria-live="polite"
                    >
                      {copyStatus === 'idle' && 'Copy to clipboard'}
                      {copyStatus === 'copying' && 'Copying...'}
                      {copyStatus === 'copied' && 'Copied!'}
                      {copyStatus === 'error' && 'Failed to copy'}
                    </button>
                  </div>

                  <div className="results-next">
                    <p className="next-label">Where to use this prompt:</p>
                    <div className="next-options">
                      <button className="next-option" onClick={() => openToolProfile('copilot')}>
                        <span className="option-icon" style={{ background: '#FFA69E', color: '#4E4348' }}>C</span>
                        <span className="option-text">
                          <strong>Copilot Chat</strong>
                          <small>Best for sensitive/confidential content</small>
                        </span>
                      </button>
                      <button className="next-option" onClick={() => openToolProfile('chatgpt')}>
                        <span className="option-icon" style={{ background: '#9ACE6E', color: '#43491D' }}>C</span>
                        <span className="option-text">
                          <strong>ChatGPT</strong>
                          <small>Quick drafts, creative content</small>
                        </span>
                      </button>
                      <button className="next-option" onClick={() => openToolProfile('claude')}>
                        <span className="option-icon" style={{ background: '#8CB3FF', color: '#1E4371' }}>C</span>
                        <span className="option-text">
                          <strong>Claude</strong>
                          <small>Complex documents, analysis</small>
                        </span>
                      </button>
                    </div>
                    <button className="help-choose-link" onClick={() => setView('flow')}>
                      Not sure? Let me help you choose →
                    </button>
                  </div>

                  <div className="results-actions">
                    <button className="builder-nav-btn secondary" onClick={() => setBuilderStep(0)}>
                      ← Edit prompt
                    </button>
                    <button className="builder-nav-btn secondary" onClick={resetBuilder}>
                      Start new prompt
                    </button>
                    <button className="builder-nav-btn primary" onClick={() => { resetBuilder(); setView('home'); }}>
                      Done
                    </button>
                  </div>

                  <p className="costar-credit">
                    Built with the <strong>CO-STAR</strong> framework from GovTech Singapore
                  </p>
                </div>
              )}
            </div>
          )}

          {view === 'glossary' && (
            <div className="glossary-view">
              <div className="glossary-header">
                <div className="glossary-title-section">
                  <h2>AI <strong>Glossary</strong></h2>
                  <p className="glossary-subtitle">Plain-language explanations of common AI terms</p>
                </div>
                <button className="btn btn-secondary" onClick={() => setView('home')}>← Back</button>
              </div>

              <div className="glossary-intro">
                <p>New to AI tools? This glossary explains the terminology you'll encounter without the jargon. Click any category to explore.</p>
              </div>

              <div className="glossary-categories">
                {glossaryData.map((category, catIndex) => (
                  <div 
                    key={catIndex} 
                    className={`glossary-category ${expandedGlossaryCategory === catIndex ? 'expanded' : ''}`}
                  >
                    <button
                      className="glossary-category-header"
                      onClick={() => setExpandedGlossaryCategory(expandedGlossaryCategory === catIndex ? null : catIndex)}
                      aria-expanded={expandedGlossaryCategory === catIndex}
                    >
                      <div className="glossary-category-info">
                        <span className="glossary-category-number">{catIndex + 1}</span>
                        <div>
                          <h3>{category.category}</h3>
                          <p>{category.description}</p>
                        </div>
                      </div>
                      <span className="glossary-expand-icon">
                        {expandedGlossaryCategory === catIndex ? '−' : '+'}
                      </span>
                    </button>
                    
                    {expandedGlossaryCategory === catIndex && (
                      <div className="glossary-terms">
                        {category.terms.map((item, termIndex) => (
                          <div key={termIndex} className="glossary-term">
                            <dt>{item.term}</dt>
                            <dd>{item.definition}</dd>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>

              <div className="glossary-footer-note">
                <p>Still have questions? Contact Justin Daly or join the AI Pioneer Network to learn from colleagues.</p>
              </div>
            </div>
          )}
        </main>

        {(view === 'home' || view === 'reference' || view === 'tool-profile' || view === 'glossary' || view === 'compare' || view === 'builder') && (
          <footer className="footer">
            <div className="footer-inner">
              <div className="footer-reminders">
                <div className="reminder-item">
                  <span className="reminder-dot"></span>
                  <span>Never put sensitive data in public AI tools</span>
                </div>
                <div className="reminder-item">
                  <span className="reminder-dot"></span>
                  <span>Always validate AI outputs</span>
                </div>
                <div className="reminder-item">
                  <span className="reminder-dot"></span>
                  <span>AI assists—you decide</span>
                </div>
                <div className="reminder-item">
                  <span className="reminder-dot"></span>
                  <span>Disclose significant AI use</span>
                </div>
              </div>
              <div className="footer-contact">
                Questions? Please contact Justin Daly
              </div>
            </div>
          </footer>
        )}
      </div>
    </div>
  );
}

// Error boundary — catches any unhandled render errors and shows a recovery UI
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error('GenAI Guide error:', error, info.componentStack);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          justifyContent: 'center', minHeight: '100vh', padding: '2rem',
          fontFamily: 'system-ui, sans-serif', textAlign: 'center'
        }}>
          <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>⚠️</div>
          <h1 style={{ fontSize: '1.5rem', marginBottom: '0.5rem' }}>Something went wrong</h1>
          <p style={{ opacity: 0.7, marginBottom: '1.5rem' }}>
            Try refreshing the page. If the problem persists, contact Justin Daly.
          </p>
          <button
            onClick={() => this.setState({ hasError: false, error: null })}
            style={{
              padding: '0.75rem 1.5rem', borderRadius: '8px', border: 'none',
              background: '#9ACE6E', color: '#1a1a1a', cursor: 'pointer',
              fontWeight: 600, fontSize: '1rem'
            }}
          >
            Try again
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// Render the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ErrorBoundary>
    <GenAIToolGuide />
  </ErrorBoundary>
);
  </script>
</body>
